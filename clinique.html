<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Denis · Outils</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#faf8f4;--bg2:#f0ebe2;
  --ink:#1a1814;--ink2:#6b6760;--ink3:#b5b2ac;
  --line:rgba(26,24,20,0.08);
}
html,body{min-height:100%;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);}
.topbar{display:flex;align-items:center;gap:10px;padding:0.65rem 1.5rem;border-bottom:1px solid var(--line);background:var(--bg);position:sticky;top:0;z-index:50;}
.tback{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink3);text-decoration:none;transition:color 0.12s;}
.tback:hover{color:var(--ink);}
.tsep{color:var(--ink3);font-size:11px;}
.ttitle{font-family:'DM Mono',monospace;font-size:12px;color:var(--ink);}
.page{max-width:520px;margin:0 auto;padding:2.5rem 1.5rem 5rem;display:flex;flex-direction:column;gap:8px;}

.tool-card{
  background:white;border:1px solid var(--line);border-radius:12px;
  padding:1rem 1.25rem;
  display:flex;align-items:center;gap:14px;
  text-decoration:none;color:inherit;
  transition:all 0.13s;
}
.tool-card:hover{border-color:var(--ink3);background:var(--bg2);}
.tool-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.tool-name{font-family:'DM Mono',monospace;font-size:13px;color:var(--ink);flex:1;}
.tool-pills{display:flex;gap:3px;flex-wrap:wrap;}
.tool-pill{font-family:'DM Mono',monospace;font-size:9px;padding:1px 6px;border-radius:999px;border:1px solid var(--line);color:var(--ink3);background:var(--bg);white-space:nowrap;}
.tool-arrow{font-family:'DM Mono',monospace;font-size:13px;color:var(--ink3);flex-shrink:0;}

.coming{border:1px solid var(--line);border-radius:12px;padding:0.9rem 1.1rem;background:var(--bg2);display:flex;flex-direction:column;gap:6px;margin-top:4px;}
.coming-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink3);}
.coming-list{display:flex;flex-wrap:wrap;gap:4px;}
.coming-item{font-family:'DM Mono',monospace;font-size:10px;padding:2px 9px;border-radius:999px;border:1px solid var(--line);color:var(--ink3);}
</style>
</head>
<body>
<div class="topbar">
  <a href="index.html" class="tback">← denis</a>
  <span class="tsep">/</span>
  <span class="ttitle">outils</span>
</div>
<div class="page">

  <a href="pico.html" class="tool-card">
    <div class="tool-dot" style="background:#1a4a2e;"></div>
    <div>
      <div class="tool-name">PICO · aide au traitement</div>
      <div class="tool-pills" style="margin-top:4px;">
        <span class="tool-pill">PubMed</span>
        <span class="tool-pill">Cochrane</span>
        <span class="tool-pill">HAS</span>
      </div>
    </div>
    <div class="tool-arrow">›</div>
  </a>

  <a href="diagnostic_medical.html" class="tool-card">
    <div class="tool-dot" style="background:#1a3a5c;"></div>
    <div>
      <div class="tool-name">aide au diagnostic</div>
      <div class="tool-pills" style="margin-top:4px;">
        <span class="tool-pill">Harrison</span>
        <span class="tool-pill">UpToDate</span>
        <span class="tool-pill">EBM</span>
      </div>
    </div>
    <div class="tool-arrow">›</div>
  </a>

  <a href="denis_cbip.html" class="tool-card">
    <div class="tool-dot" style="background:#e8a598;"></div>
    <div>
      <div class="tool-name">CBIP · pharmacologie</div>
      <div class="tool-pills" style="margin-top:4px;">
        <span class="tool-pill">cbip.be</span>
        <span class="tool-pill">2026</span>
        <span class="tool-pill">EBM</span>
      </div>
    </div>
    <div class="tool-arrow">›</div>
  </a>

  <div class="coming">
    <div class="coming-label">// à venir</div>
    <div class="coming-list">
      <span class="coming-item">anatomie</span>
      <span class="coming-item">physiologie</span>
      <span class="coming-item">ECNI · EDN</span>
      <span class="coming-item">PACES · PASS</span>
      <span class="coming-item">sémiologie</span>
    </div>
  </div>

</div>
</body>
</html>
