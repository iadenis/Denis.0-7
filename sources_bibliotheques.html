<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Denis · Bibliothèques</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#faf8f4;--bg2:#f0ebe2;
  --ink:#1a1814;--ink2:#6b6760;--ink3:#b5b2ac;
  --sky:#8fb4c8;--sage:#7a9e87;--amber:#c8a870;--lav:#a89ec8;
  --sky-bg:rgba(143,180,200,0.07);--sky-border:rgba(143,180,200,0.2);
  --line:rgba(26,24,20,0.08);
}
html,body{min-height:100%;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;gap:10px;padding:0.65rem 1.5rem;border-bottom:1px solid var(--line);background:var(--bg);position:sticky;top:0;z-index:50;}
.tback{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink3);text-decoration:none;transition:color 0.12s;}
.tback:hover{color:var(--ink);}
.tsep{color:var(--ink3);font-size:11px;}
.ttitle{font-family:'DM Mono',monospace;font-size:12px;color:var(--ink);}

/* ── PAGE ── */
.page{max-width:560px;margin:0 auto;padding:2.5rem 1.5rem 6rem;display:flex;flex-direction:column;gap:3rem;}

/* ── HERO ANIMATION ── */
.hero{display:flex;flex-direction:column;gap:1.5rem;}
.hero-text{}
.hero-eyebrow{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink3);margin-bottom:0.5rem;}
.hero-title{font-family:'DM Mono',monospace;font-size:26px;font-weight:300;color:var(--ink);line-height:1.2;margin-bottom:0.75rem;}
.hero-title span{color:var(--sky);}
.hero-desc{font-size:13.5px;color:var(--ink2);line-height:1.85;font-weight:300;}

/* Animation IA contrôlée — pipeline animé */
.ia-vis{
  background:var(--bg2);
  border:1px solid var(--line);
  border-radius:14px;
  padding:1.5rem 1.75rem;
  display:flex;flex-direction:column;gap:1.25rem;
  position:relative;
  overflow:hidden;
}
.ia-vis::before{
  content:'';
  position:absolute;inset:0;
  background:radial-gradient(ellipse at 70% 50%, rgba(143,180,200,0.06) 0%, transparent 70%);
  pointer-events:none;
}

/* Nodes */
.pipe{display:flex;align-items:center;justify-content:center;gap:0;}
.pipe-step{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;}
.pipe-node{
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  border:1px solid var(--line);background:white;
  font-size:16px;position:relative;
  flex-shrink:0;
}
.pipe-node.ai-node{
  background:var(--ink);border-color:var(--ink);
  font-family:'DM Mono',monospace;font-size:11px;font-weight:500;color:white;
}
.pipe-node.out-node{
  background:rgba(122,158,135,0.07);
  border-color:rgba(122,158,135,0.3);
}
.pipe-lbl{font-family:'DM Mono',monospace;font-size:8px;color:var(--ink3);text-align:center;line-height:1.4;letter-spacing:0.03em;}

/* Flèche animée */
.pipe-arrow{
  flex:0 0 28px;
  display:flex;align-items:center;justify-content:center;
  position:relative;height:2px;
  margin-bottom:16px;
}
.pipe-arrow::before{
  content:'';
  position:absolute;
  left:0;top:0;height:1px;
  background:linear-gradient(90deg, var(--ink3), transparent);
  animation:flow 1.6s ease-in-out infinite;
  width:100%;
}
.pipe-arrow::after{
  content:'›';
  position:absolute;right:-2px;top:-7px;
  font-family:'DM Mono',monospace;font-size:11px;color:var(--ink3);
}
@keyframes flow{
  0%{opacity:0.2;transform:scaleX(0.3);transform-origin:left;}
  50%{opacity:1;transform:scaleX(1);transform-origin:left;}
  100%{opacity:0.2;transform:scaleX(1);transform-origin:right;}
}

/* Pulse sur nœud IA */
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(26,24,20,0.3);}70%{box-shadow:0 0 0 8px rgba(26,24,20,0);}100%{box-shadow:0 0 0 0 rgba(26,24,20,0);}}
.pipe-node.ai-node{animation:pulse 2.4s ease-out infinite;}

.ia-vis-note{
  font-size:11.5px;color:var(--ink2);line-height:1.75;
  padding-top:0.9rem;border-top:1px solid var(--line);
  text-align:center;
}
.ia-vis-note strong{color:var(--ink);font-weight:400;}

/* ── SECTION — TA BIBLIOTHÈQUE ── */
.section{display:flex;flex-direction:column;gap:1rem;}
.section-head{display:flex;flex-direction:column;gap:3px;padding-bottom:8px;border-bottom:1px solid var(--line);}
.section-title{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink3);}

/* Cadre bibli perso — bleu */
.build-card{
  background:var(--sky-bg);
  border:1px solid var(--sky-border);
  border-radius:13px;
  padding:1.4rem 1.5rem;
  display:flex;flex-direction:column;
  gap:1rem;
}
.build-eyebrow{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--sky);margin-bottom:2px;}
.build-title{font-family:'DM Mono',monospace;font-size:18px;font-weight:300;color:var(--ink);line-height:1.2;}
.build-desc{font-size:13px;color:var(--ink2);line-height:1.75;}
.build-desc strong{color:var(--ink);font-weight:400;}

.my-sources{display:flex;flex-direction:column;gap:4px;min-height:20px;}
.my-src-item{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:7px;background:rgba(143,180,200,0.08);border:1px solid var(--sky-border);}
.my-src-url{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.my-src-del{color:var(--ink3);cursor:pointer;font-size:12px;line-height:1;padding:1px 2px;}
.my-src-del:hover{color:var(--ink);}
.my-empty{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink3);padding:3px 0;}

.input-row{display:flex;gap:6px;}
.url-input{flex:1;font-family:'DM Mono',monospace;font-size:11px;padding:8px 10px;border:1px solid var(--sky-border);border-radius:8px;background:white;color:var(--ink);outline:none;transition:border-color 0.12s;}
.url-input:focus{border-color:var(--sky);}
.add-btn{font-family:'DM Mono',monospace;font-size:11px;padding:8px 13px;border-radius:8px;background:var(--ink);color:white;border:none;cursor:pointer;flex-shrink:0;transition:opacity 0.12s;}
.add-btn:hover{opacity:0.8;}

.build-footer{padding-top:0.75rem;border-top:1px solid var(--sky-border);display:flex;flex-direction:column;gap:0.6rem;}
.build-ctrl{font-size:12px;color:var(--ink2);line-height:1.7;}
.build-ctrl strong{color:var(--ink);font-weight:400;}
.build-actions{display:flex;gap:6px;}
.build-btn{font-family:'DM Mono',monospace;font-size:10px;padding:6px 13px;border-radius:999px;border:1px solid var(--sky-border);background:none;color:var(--sky);cursor:pointer;transition:all 0.12s;}
.build-btn:hover{background:rgba(143,180,200,0.12);}
.build-btn.primary{background:rgba(143,180,200,0.12);}

/* Chat IA */
.ia-chat{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:white;}
.ia-chat-head{display:flex;align-items:center;gap:8px;padding:0.6rem 1rem;border-bottom:1px solid var(--line);background:var(--bg2);}
.ia-chat-title{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink);flex:1;}
.ia-chat-tag{font-family:'DM Mono',monospace;font-size:9px;padding:2px 7px;border-radius:999px;background:var(--sky-bg);border:1px solid var(--sky-border);color:var(--sky);}
.ia-chat-close{background:none;border:none;font-size:14px;color:var(--ink3);cursor:pointer;}
.ia-msgs{padding:0.85rem 1rem;display:flex;flex-direction:column;gap:5px;max-height:180px;overflow-y:auto;}
.ia-msg{font-family:'DM Mono',monospace;font-size:11px;line-height:1.65;padding:6px 9px;border-radius:8px;max-width:88%;}
.ia-msg.user{background:var(--ink);color:white;align-self:flex-end;}
.ia-msg.ai{background:var(--bg2);border:1px solid var(--line);color:var(--ink2);align-self:flex-start;}
.ia-msg.ai.loading{color:var(--ink3);font-style:italic;}
.ia-foot{display:flex;gap:6px;padding:0.6rem 1rem;border-top:1px solid var(--line);}
.ia-input{flex:1;font-family:'DM Mono',monospace;font-size:11px;padding:7px 9px;border:1px solid var(--line);border-radius:8px;background:var(--bg);color:var(--ink);outline:none;resize:none;}
.ia-input:focus{border-color:var(--ink3);}
.ia-send{font-family:'DM Mono',monospace;font-size:11px;padding:7px 13px;border-radius:8px;background:var(--ink);color:white;border:none;cursor:pointer;transition:opacity 0.12s;}
.ia-send:hover{opacity:0.75;}

/* ── FEEDBACK ── */
.feedback{border:1px solid var(--line);border-radius:11px;padding:0.9rem 1.1rem;background:var(--bg2);}
.feedback-head{display:flex;align-items:center;gap:8px;margin-bottom:0.6rem;}
.feedback-title{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink);flex:1;}
.feedback-close{background:none;border:none;font-size:14px;color:var(--ink3);cursor:pointer;}
textarea.feedback-area{width:100%;font-family:'DM Mono',monospace;font-size:11px;padding:8px 9px;border:1px solid var(--line);border-radius:7px;background:white;color:var(--ink);outline:none;resize:vertical;min-height:65px;}
.feedback-send{font-family:'DM Mono',monospace;font-size:11px;margin-top:6px;padding:5px 13px;border-radius:999px;background:var(--ink);color:white;border:none;cursor:pointer;}

@media(max-width:480px){.pipe-lbl{font-size:7.5px;}.pipe-node{width:34px;height:34px;font-size:14px;}}
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="tback">← denis</a>
  <span class="tsep">/</span>
  <span class="ttitle">bibliothèques</span>
</div>

<div class="page">

  <!-- ══ HERO — CONCEPT IA CONTRÔLÉE ══ -->
  <div class="hero">

    <div class="hero-text">
      <div class="hero-eyebrow">// ta bibliothèque · ton IA</div>
      <div class="hero-title">tes sources.<br><span>ton IA.</span></div>

    </div>

    <!-- Animation pipeline -->
    <div class="ia-vis">
      <div class="pipe">

        <div class="pipe-step">
          <div class="pipe-node">📄</div>
          <div class="pipe-lbl">tes<br>sources</div>
        </div>

        <div class="pipe-arrow"></div>

        <div class="pipe-step">
          <div class="pipe-node">📚</div>
          <div class="pipe-lbl">bibli<br>ouvertes</div>
        </div>

        <div class="pipe-arrow"></div>

        <div class="pipe-step">
          <div class="pipe-node ai-node">AI</div>
          <div class="pipe-lbl">denis<br>IA</div>
        </div>

        <div class="pipe-arrow"></div>

        <div class="pipe-step">
          <div class="pipe-node out-node">💬</div>
          <div class="pipe-lbl">réponse<br>ciblée</div>
        </div>

      </div>


    </div>

  </div>


  <!-- ══ TA BIBLIOTHÈQUE ══ -->
  <div class="section">
<div class="build-card">
      <div>
        <div class="build-eyebrow">// ta bibliothèque personnelle</div>
        <div class="build-title">tes sources. ton IA.</div>
      </div>

<div class="my-sources" id="my-sources"></div>

      <div class="input-row">
        <input class="url-input" id="my-input" type="text" placeholder="https://… · DOI · lien PubMed" onkeydown="if(event.key==='Enter')addMySource()">
        <button class="add-btn" onclick="addMySource()">+ ajouter</button>
      </div>

      <div class="build-footer">
        <div class="build-actions">
          <button class="build-btn primary" onclick="toggleChat()">interroger →</button>
          <button class="build-btn" onclick="toggleFeedback()">signaler une erreur</button>
        </div>
      </div>
    </div>

    <!-- Chat -->
    <div class="ia-chat" id="ia-chat" style="display:none;">
      <div class="ia-chat-head">
        <span class="ia-chat-title">// interroger</span>
        <span class="ia-chat-tag">IA contrôlée</span>
        <button class="ia-chat-close" onclick="toggleChat()">×</button>
      </div>
      <div class="ia-msgs" id="ia-msgs">
        <div class="ia-msg ai">Pose ta question — je réponds à partir des sources chargées.</div>
      </div>
      <div class="ia-foot">
        <textarea class="ia-input" id="ia-input" rows="2" placeholder="ta question ici…" onkeydown="iaKey(event)"></textarea>
        <button class="ia-send" onclick="iaSend()">→</button>
      </div>
    </div>

    <!-- Feedback -->
    <div class="feedback" id="feedback" style="display:none;">
      <div class="feedback-head">
        <span class="feedback-title">// signaler une erreur</span>
        <button class="feedback-close" onclick="toggleFeedback()">×</button>
      </div>
      <textarea class="feedback-area" placeholder="Réponse incorrecte, source manquante, erreur de contenu…"></textarea>
      <button class="feedback-send">envoyer →</button>
    </div>

  </div>

</div>

<script>
/* ── SOURCES ── */
let mySources = [];
try { const s = localStorage.getItem('denis_my_sources'); if(s) mySources = JSON.parse(s); } catch(e){}
function save(){ try { localStorage.setItem('denis_my_sources', JSON.stringify(mySources)); } catch(e){} }

function renderMy(){
  const c = document.getElementById('my-sources');
  if(!mySources.length){
    c.innerHTML = '<div class="my-empty">// aucune source — ajoute une URL ci-dessous</div>';
    return;
  }
  c.innerHTML = mySources.map((s,i) =>
    `<div class="my-src-item"><span class="my-src-url">${s}</span><span class="my-src-del" onclick="removeMy(${i})">×</span></div>`
  ).join('');
}
function addMySource(){
  const inp = document.getElementById('my-input');
  const v = inp.value.trim(); if(!v) return;
  mySources.push(v); save(); inp.value = ''; renderMy();
}
function removeMy(i){ mySources.splice(i,1); save(); renderMy(); }
renderMy();

/* ── CHAT ── */
function toggleChat(){
  const p = document.getElementById('ia-chat');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
  if(p.style.display === 'block') p.scrollIntoView({behavior:'smooth', block:'nearest'});
}
function toggleFeedback(){
  const p = document.getElementById('feedback');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
}

let iaid = 0;
function addMsg(role, text, loading=false){
  const m = document.getElementById('ia-msgs');
  const id = 'm'+(++iaid);
  const d = document.createElement('div');
  d.id = id; d.className = 'ia-msg ' + role + (loading ? ' loading' : '');
  d.textContent = text; m.appendChild(d); m.scrollTop = m.scrollHeight;
  return id;
}
function updMsg(id, text){
  const el = document.getElementById(id);
  if(el){ el.textContent = text; el.classList.remove('loading'); }
  document.getElementById('ia-msgs').scrollTop = 9999;
}
function iaKey(e){ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); iaSend(); } }

async function iaSend(){
  const inp = document.getElementById('ia-input');
  const text = inp.value.trim(); if(!text) return;
  const k = localStorage.getItem('denis_api_key');
  if(!k){ addMsg('ai','// clé API manquante — stocke ta clé dans localStorage : denis_api_key'); return; }
  addMsg('user', text); inp.value = '';
  const ctx = mySources.length
    ? `Sources disponibles : ${mySources.join(', ')}.`
    : 'Aucune source personnelle chargée.';
  const lid = addMsg('ai', '// réflexion…', true);
  try {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':k,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514', max_tokens:1000,
        system:`Denis, assistant pédagogique. ${ctx} Réponds de façon concise et cite tes sources.`,
        messages:[{role:'user', content:text}]
      })
    });
    const d = await r.json();
    updMsg(lid, d.content?.[0]?.text || '// erreur');
  } catch(e){ updMsg(lid, '// erreur réseau'); }
}
</script>
</body>
</html>
